<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14161f;
    --ink-2:#1c1f2c;
    --card:#20242f;
    --gold:#d9a441;
    --violet:#8f80e0;
    --paper:#eee9de;
    --paper-dim:#a8a6ab;
    --notch:#0e1017;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% -10%, rgba(143,128,224,0.12), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(217,164,65,0.10), transparent 35%),
      var(--ink);
    color:var(--paper);
    font-family:'Inter', sans-serif;
    padding:56px 24px 80px;
  }

  header{
    max-width:1000px;
    margin:0 auto 48px;
  }

  .eyebrow{
    font-family:'Space Grotesk', sans-serif;
    font-size:13px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 10px;
  }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(32px, 5vw, 48px);
    margin:0 0 12px;
    letter-spacing:-0.01em;
  }

  header p{
    color:var(--paper-dim);
    font-size:16px;
    max-width:520px;
    line-height:1.5;
    margin:0;
  }

  .shelf{
    max-width:1000px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:22px;
  }

  .cartridge{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:inherit;
    padding:28px 14px 18px;
    background:var(--card);
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.06);
    cursor:pointer;
    transition:transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
  }

  /* cartridge notch */
  .cartridge::before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    transform:translate(-50%, -50%);
    width:34px;
    height:14px;
    background:var(--notch);
    border-radius:0 0 8px 8px;
  }

  .cartridge:hover{
    transform:translateY(-4px);
    border-color:var(--violet);
    box-shadow:0 12px 24px -12px rgba(143,128,224,0.45);
  }

  .cartridge:active{
    transform:translateY(-1px) scale(0.97);
  }

  .icon{
    width:56px;
    height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    border-radius:12px;
    background:linear-gradient(160deg, rgba(217,164,65,0.18), rgba(143,128,224,0.14));
    margin-bottom:14px;
  }

  .name{
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    font-size:14px;
    text-align:center;
    line-height:1.3;
  }

  .status{
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--paper-dim);
    margin-top:6px;
    opacity:0.7;
  }

  footer{
    max-width:1000px;
    margin:56px auto 0;
    font-size:13px;
    color:var(--paper-dim);
  }

  code{
    background:rgba(255,255,255,0.06);
    padding:2px 6px;
    border-radius:4px;
    font-size:12px;
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">L</p>
  <h1>Games Library</h1>
  <p>Pick a game to play</p>
</header>

<main class="shelf" id="shelf"></main>

<footer>
  Add a game by editing the <code>games</code> list in the script below, then drop the matching HTML file into the repo root, right next to <code>index.html</code>.
</footer>

<script>
  // ---- Edit this list to add / remove games ----
  // file: path to the game's HTML file (relative to this page)
  const games = [
    { name: "Basket Random",        icon: "🏀", file: "basketrandom.html" },
    { name: "Breakout",     icon: "L", file: "breakout.html" },
    { name: "2048",         icon: "🔢", file: "2048.html" },
    { name: "Memory Match", icon: "🃏", file: "memory.html" },
    { name: "Space Blaster",icon: "🚀", file: "space-blaster.html" },
    { name: "Tic Tac Toe",  icon: "❌", file: "tic-tac-toe.html" },
  ];
  // ------------------------------------------------

  const shelf = document.getElementById('shelf');

  games.forEach(game => {
    const a = document.createElement('a');
    a.className = 'cartridge';
    a.href = game.file;
    a.innerHTML = `
      <div class="icon">${game.icon}</div>
      <div class="name">${game.name}</div>
      <div class="status">Play</div>
    `;
    shelf.appendChild(a);
  });
</script>

</body>
</html>
